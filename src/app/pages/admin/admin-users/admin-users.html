<div>
  <div class="mb-6">
    <h2 class="text-2xl font-bold text-white">Users</h2>
    <p class="text-gray-400 text-sm mt-1">Manage all students and instructors</p>
  </div>

  <!-- Search + Filter -->
  <div class="flex flex-wrap gap-3 mb-6">
    <input
      [(ngModel)]="search"
      type="text"
      placeholder="Search by name or email..."
      class="flex-1 min-w-50 px-4 py-2 bg-gray-900 border border-gray-700 rounded-xl text-white text-sm placeholder-gray-500 focus:outline-none focus:border-red-500"/>

    <div class="flex gap-2">
      <button *ngFor="let f of ['all', 'student', 'instructor']"
        (click)="setFilter(f)"
        [class]="filter === f
          ? 'px-4 py-2 rounded-xl bg-red-600 text-white text-sm font-medium'
          : 'px-4 py-2 rounded-xl bg-gray-800 text-gray-400 text-sm hover:bg-gray-700'">
        {{ f | titlecase }}
      </button>
    </div>
  </div>

  <!-- Loading -->
  <div *ngIf="loading" class="flex justify-center py-16">
    <mat-spinner diameter="40"></mat-spinner>
  </div>

  <!-- Users List -->
  <div *ngIf="!loading" class="bg-gray-900 rounded-2xl border border-gray-800 overflow-hidden">
    <div *ngIf="filtered.length === 0" class="px-6 py-12 text-center">
      <mat-icon class="text-5xl text-gray-600 mb-3">people</mat-icon>
      <p class="text-gray-400">No users found</p>
    </div>

    <div *ngFor="let u of filtered; let last = last"
     [routerLink]="[u.id]"
     [class]="!last ? 'px-6 py-4 border-b border-gray-800 flex items-center justify-between hover:bg-gray-800/50 transition-colors cursor-pointer'
                    : 'px-6 py-4 flex items-center justify-between hover:bg-gray-800/50 transition-colors cursor-pointer'">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-full bg-indigo-600 flex items-center justify-center text-white font-bold">
          {{ u.name?.charAt(0).toUpperCase() }}
        </div>
        <div>
          <p class="text-white font-medium">{{ u.name }}</p>
          <p class="text-gray-400 text-xs">{{ u.email }}</p>
          <p class="text-gray-500 text-xs">Joined: {{ u.createdAt | date:'mediumDate' }}</p>
        </div>
      </div>
      <div class="flex items-center gap-3">
        <span [class]="u.role === 'student'
          ? 'text-xs px-3 py-1 rounded-full bg-blue-500/20 text-blue-400 font-medium'
          : u.role === 'instructor'
          ? 'text-xs px-3 py-1 rounded-full bg-purple-500/20 text-purple-400 font-medium'
          : 'text-xs px-3 py-1 rounded-full bg-red-500/20 text-red-400 font-medium'">
          {{ u.role }}
        </span>
        <button (click)="deleteUser(u.id)"
          class="text-gray-500 hover:text-red-400 transition-colors p-2 rounded-lg hover:bg-red-500/10">
          <mat-icon>delete</mat-icon>
        </button>
      </div>
    </div>
  </div>
</div>
