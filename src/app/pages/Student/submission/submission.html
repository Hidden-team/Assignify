<div>
  <div class="mb-6">
    <h2 class="text-2xl font-bold text-white">My Submissions</h2>
    <p class="text-gray-400 text-sm mt-1">Track all your submitted assignments</p>
  </div>

  <!-- Filter tabs -->
  <div class="flex gap-2 mb-6 flex-wrap">
    <button *ngFor="let f of ['all','submitted','graded','pending']"
      type="button" (click)="setFilter(f)"
      [style]="filter === f
        ? 'background:#4f46e5; color:white; padding:6px 16px; border-radius:20px; font-size:13px; font-weight:600; border:none; cursor:pointer;'
        : 'background:#1f2937; color:#9ca3af; padding:6px 16px; border-radius:20px; font-size:13px; font-weight:500; border:1px solid #374151; cursor:pointer;'">
      {{ f | titlecase }}
    </button>
  </div>

  <div *ngIf="loading" class="flex justify-center py-16">
    <mat-spinner diameter="40"></mat-spinner>
  </div>

  <div *ngIf="!loading && filtered.length === 0"
       class="bg-gray-900 rounded-2xl border border-gray-800 p-12 text-center">
    <mat-icon class="text-5xl text-gray-600 mb-3">inbox</mat-icon>
    <p class="text-gray-400">No submissions found.</p>
  </div>

  <div *ngIf="!loading" class="grid gap-4">
    <div *ngFor="let s of filtered"
         class="bg-gray-900 rounded-2xl border border-gray-800 p-5 hover:border-gray-700 transition-all">

      <div class="flex items-start justify-between gap-4 flex-wrap">
        <div class="flex-1 min-w-0">
          <h3 class="text-white font-semibold">
            {{ s.assignment?.title ?? 'Assignment' }}
          </h3>
          <p class="text-gray-500 text-xs mt-1">
            Submitted: {{ s.submittedAt | date:'medium' }}
          </p>
          <p *ngIf="s.notes" class="text-gray-400 text-sm mt-2 line-clamp-2">
            {{ s.notes }}
          </p>
          <p *ngIf="s.feedback" class="text-indigo-300 text-sm mt-2">
            <span class="font-medium">Feedback:</span> {{ s.feedback }}
          </p>
        </div>

        <div class="flex flex-col items-end gap-2">
          <!-- Status -->
          <span [style]="s.status === 'graded'
              ? 'background:rgba(167,139,250,0.15); color:#a78bfa; padding:4px 12px; border-radius:20px; font-size:12px; font-weight:600;'
              : s.status === 'submitted'
              ? 'background:rgba(34,197,94,0.15); color:#4ade80; padding:4px 12px; border-radius:20px; font-size:12px; font-weight:600;'
              : 'background:rgba(234,179,8,0.15); color:#facc15; padding:4px 12px; border-radius:20px; font-size:12px; font-weight:600;'">
            {{ s.status | titlecase }}
          </span>
          <!-- Grade -->
          <span *ngIf="s.grade !== null && s.grade !== undefined"
            class="text-white font-bold text-lg">
            {{ s.grade }} / {{ s.assignment?.totalMarks ?? '?' }}
          </span>
        </div>
      </div>

    </div>
  </div>
</div>
