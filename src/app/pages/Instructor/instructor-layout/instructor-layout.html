<div class="flex h-screen bg-gray-950 overflow-hidden">

  <!-- Mobile overlay -->
  <div *ngIf="sidebarOpen && isMobile"
       class="fixed inset-0 bg-black/50 z-20"
       (click)="toggleSidebar()"></div>

  <!-- ── Sidebar ───────────────────────────────────────────────────────────── -->
  <aside [class]="sidebarOpen
    ? 'fixed md:relative z-30 flex flex-col w-64 h-full bg-gray-900 border-r border-gray-800 transition-all duration-300'
    : 'fixed md:relative z-30 flex flex-col w-0 md:w-16 h-full bg-gray-900 border-r border-gray-800 overflow-hidden transition-all duration-300'">

    <!-- Logo -->
    <div class="flex items-center gap-3 px-4 py-5 border-b border-gray-800 shrink-0">
      <div class="w-8 h-8 bg-violet-600 rounded-lg flex items-center justify-center shrink-0">
        <mat-icon class="!text-white !text-base">school</mat-icon>
      </div>
      <span *ngIf="sidebarOpen" class="text-white font-bold text-lg tracking-tight">Assignify</span>
    </div>

    <!-- Nav -->
    <nav class="flex-1 px-2 py-4 space-y-1 overflow-y-auto">
      <a *ngFor="let item of navItems"
         [routerLink]="getFullRoute(item.route)"
         (click)="isMobile && toggleSidebar()"
         [class]="isActive(item.route)
           ? 'flex items-center gap-3 px-3 py-2.5 rounded-xl bg-violet-600 text-white cursor-pointer transition-all'
           : 'flex items-center gap-3 px-3 py-2.5 rounded-xl text-gray-400 hover:bg-gray-800 hover:text-white cursor-pointer transition-all'">
        <mat-icon class="shrink-0">{{ item.icon }}</mat-icon>
        <span *ngIf="sidebarOpen" class="text-sm font-medium whitespace-nowrap">{{ item.label }}</span>
      </a>
    </nav>

    <!-- User + Logout -->
    <div class="px-2 py-3 border-t border-gray-800 shrink-0">
      <div *ngIf="sidebarOpen" class="flex items-center gap-3 px-3 py-2 mb-1">
        <div class="w-8 h-8 rounded-full bg-violet-600 flex items-center justify-center text-white text-sm font-bold shrink-0">
          {{ userName.charAt(0).toUpperCase() }}
        </div>
        <div class="overflow-hidden">
          <p class="text-white text-sm font-semibold truncate">{{ userName }}</p>
          <p class="text-violet-400 text-xs">Instructor</p>
        </div>
      </div>
      <button (click)="logout()"
        class="flex items-center gap-3 px-3 py-2.5 w-full rounded-xl text-gray-400 hover:bg-red-500/10 hover:text-red-400 transition-all">
        <mat-icon class="shrink-0">logout</mat-icon>
        <span *ngIf="sidebarOpen" class="text-sm font-medium">Logout</span>
      </button>
    </div>

  </aside>

  <!-- ── Main Content ──────────────────────────────────────────────────────── -->
  <div class="flex-1 flex flex-col overflow-hidden min-w-0">

    <!-- Topbar -->
    <header class="h-14 bg-gray-900 border-b border-gray-800 flex items-center px-4 gap-3 shrink-0">
      <button (click)="toggleSidebar()"
        class="text-gray-400 hover:text-white transition-colors p-1 rounded-lg hover:bg-gray-800">
        <mat-icon>menu</mat-icon>
      </button>
      <div class="flex-1"></div>
      <div class="flex items-center gap-2">
        <div class="w-8 h-8 rounded-full bg-violet-600 flex items-center justify-center text-white text-sm font-bold">
          {{ userName.charAt(0).toUpperCase() }}
        </div>
        <span class="text-white text-sm font-medium hidden md:block">{{ userName }}</span>
      </div>
    </header>

    <!-- Page Content -->
    <main class="flex-1 overflow-y-auto p-4 md:p-6 bg-gray-950">
      <router-outlet></router-outlet>
    </main>

  </div>
</div>
