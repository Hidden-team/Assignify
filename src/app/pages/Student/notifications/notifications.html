<div>
      <div class="mb-6">
        <h2 class="text-2xl font-bold text-white">Notifications</h2>
        <p class="text-gray-400 text-sm mt-1">Your latest updates</p>
      </div>
      <div *ngIf="loading" class="flex justify-center py-16"><mat-spinner diameter="40"></mat-spinner></div>
      <div *ngIf="!loading && notifications.length === 0" class="bg-gray-900 rounded-2xl border border-gray-800 p-12 text-center">
        <mat-icon class="text-5xl text-gray-600 mb-3">notifications_none</mat-icon>
        <p class="text-gray-400">No notifications yet.</p>
      </div>
      <div *ngIf="!loading" class="grid gap-3">
        <div *ngFor="let n of notifications" class="bg-gray-900 rounded-2xl border border-gray-800 p-4 flex items-start gap-4">
          <div class="w-10 h-10 rounded-xl bg-indigo-500/20 flex items-center justify-center shrink-0">
            <mat-icon class="text-indigo-400">{{ n.icon }}</mat-icon>
          </div>
          <div>
            <p class="text-white font-medium text-sm">{{ n.title }}</p>
            <p class="text-gray-400 text-xs mt-0.5">{{ n.message }}</p>
            <p class="text-gray-600 text-xs mt-1">{{ n.time | date:'medium' }}</p>
          </div>
        </div>
      </div>
    </div>
