<div>
  <div class="mb-6">
    <h2 class="text-2xl font-bold text-white">Submissions</h2>
    <p class="text-gray-400 text-sm mt-1">View all student submissions</p>
  </div>

  <!-- Search + Filter -->
  <div class="flex flex-wrap gap-3 mb-6">
    <input
      [(ngModel)]="search"
      type="text"
      placeholder="Search by student or assignment..."
      class="flex-1 min-w-50 px-4 py-2 bg-gray-900 border border-gray-700 rounded-xl text-white text-sm placeholder-gray-500 focus:outline-none focus:border-red-500"/>
    <div class="flex gap-2">
      <button *ngFor="let f of ['all', 'submitted', 'graded']"
        (click)="setFilter(f)"
        [class]="filter === f
          ? 'px-4 py-2 rounded-xl bg-red-600 text-white text-sm font-medium'
          : 'px-4 py-2 rounded-xl bg-gray-800 text-gray-400 text-sm hover:bg-gray-700'">
        {{ f | titlecase }}
      </button>
    </div>
  </div>

  <!-- Loading -->
  <div *ngIf="loading" class="flex justify-center py-16">
    <mat-spinner diameter="40"></mat-spinner>
  </div>

  <!-- Submissions List -->
  <div *ngIf="!loading" class="grid gap-4">
    <div *ngIf="filtered.length === 0" class="bg-gray-900 rounded-2xl border border-gray-800 p-12 text-center">
      <mat-icon class="text-5xl text-gray-600 mb-3">task</mat-icon>
      <p class="text-gray-400">No submissions found</p>
    </div>

    <div *ngFor="let s of filtered"
         class="bg-gray-900 rounded-2xl border border-gray-800 p-5 hover:border-red-500/30 transition-all">
      <div class="flex items-start justify-between gap-4 flex-wrap">
        <div class="flex-1 min-w-0">

          <div class="flex items-center gap-2 mb-2 flex-wrap">
            <h3 class="text-white font-semibold">{{ s.assignment?.title ?? 'Unknown Assignment' }}</h3>
            <span [class]="s.status === 'graded'
              ? 'text-xs px-3 py-1 rounded-full bg-green-500/20 text-green-400 font-medium'
              : 'text-xs px-3 py-1 rounded-full bg-yellow-500/20 text-yellow-400 font-medium'">
              {{ s.status }}
            </span>
          </div>

          <div class="flex items-center gap-4 text-xs text-gray-500 flex-wrap mb-3">
            <span class="flex items-center gap-1">
              <mat-icon class="text-sm">person</mat-icon>
              {{ s.studentName }}
            </span>
            <span class="flex items-center gap-1">
              <mat-icon class="text-sm">schedule</mat-icon>
              {{ s.submittedAt | date:'medium' }}
            </span>
            <span *ngIf="s.status === 'graded'" class="flex items-center gap-1">
              <mat-icon class="text-sm">grade</mat-icon>
              Grade: {{ s.grade }} / {{ s.assignment?.totalMarks }}
            </span>
          </div>

          <button *ngIf="s.fileURL" (click)="openFile(s.fileURL)"
            class="flex items-center gap-2 px-3 py-1.5 rounded-lg bg-indigo-500/10 text-indigo-400 hover:bg-indigo-500/20 transition-all text-sm">
            <mat-icon class="text-sm">picture_as_pdf</mat-icon>
            {{ s.fileName || 'View File' }}
          </button>

          <p *ngIf="s.feedback" class="text-gray-400 text-xs mt-2">
            <span class="text-gray-500">Feedback:</span> {{ s.feedback }}
          </p>

        </div>
      </div>
    </div>
  </div>
</div>
