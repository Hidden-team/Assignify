<div class="max-w-2xl mx-auto">

  <!-- Back button -->
  <button (click)="goBack()"
    class="flex items-center gap-2 text-gray-400 hover:text-white transition-colors mb-6">
    <mat-icon>arrow_back</mat-icon>
    Back to Users
  </button>

  <!-- Loading -->
  <div *ngIf="loading" class="flex justify-center py-16">
    <mat-spinner diameter="40"></mat-spinner>
  </div>

  <div *ngIf="!loading && user">

    <!-- User Header -->
    <div class="bg-gray-900 rounded-2xl border border-gray-800 p-6 mb-6 flex items-center gap-4">
      <div class="w-16 h-16 rounded-full bg-red-600 flex items-center justify-center text-white text-2xl font-bold">
        {{ user.name?.charAt(0).toUpperCase() }}
      </div>
      <div>
        <h2 class="text-2xl font-bold text-white">{{ user.name }}</h2>
        <p class="text-gray-400 text-sm">{{ user.email }}</p>
        <span [class]="user.role === 'student'
          ? 'text-xs px-3 py-1 rounded-full bg-blue-500/20 text-blue-400 font-medium'
          : user.role === 'instructor'
          ? 'text-xs px-3 py-1 rounded-full bg-purple-500/20 text-purple-400 font-medium'
          : 'text-xs px-3 py-1 rounded-full bg-red-500/20 text-red-400 font-medium'">
          {{ user.role }}
        </span>
      </div>
    </div>

    <!-- Edit User Info -->
    <div class="bg-gray-900 rounded-2xl border border-gray-800 p-6 mb-6">
      <h3 class="text-white font-semibold text-lg mb-4">Edit User Info</h3>

      <!-- Name -->
      <div class="mb-4">
        <label class="block text-sm text-gray-400 mb-1">Name</label>
        <input [(ngModel)]="editName" type="text"
          class="w-full px-4 py-2.5 bg-gray-800 border border-gray-700 rounded-xl text-white text-sm focus:outline-none focus:border-red-500"/>
      </div>

      <!-- Email -->
      <div class="mb-4">
        <label class="block text-sm text-gray-400 mb-1">Email</label>
        <input [(ngModel)]="editEmail" type="email"
          class="w-full px-4 py-2.5 bg-gray-800 border border-gray-700 rounded-xl text-white text-sm focus:outline-none focus:border-red-500"/>
      </div>

      <!-- Role -->
      <div class="mb-6">
        <label class="block text-sm text-gray-400 mb-1">Role</label>
        <select [(ngModel)]="editRole"
          class="w-full px-4 py-2.5 bg-gray-800 border border-gray-700 rounded-xl text-white text-sm focus:outline-none focus:border-red-500">
          <option value="student">Student</option>
          <option value="instructor">Instructor</option>
          <option value="admin">Admin</option>
        </select>
      </div>

      <!-- Success / Error -->
      <div *ngIf="saveSuccess" class="mb-4 p-3 rounded-lg bg-green-500/10 border border-green-500/30 text-green-400 text-sm">
        {{ saveSuccess }}
      </div>
      <div *ngIf="saveError" class="mb-4 p-3 rounded-lg bg-red-500/10 border border-red-500/30 text-red-400 text-sm">
        {{ saveError }}
      </div>

      <button (click)="saveInfo()" [disabled]="saving"
        class="px-6 py-2.5 bg-red-600 text-white rounded-xl font-medium hover:bg-red-700 transition-colors disabled:opacity-50">
        {{ saving ? 'Saving...' : 'Save Changes' }}
      </button>
    </div>

    <!-- Change Password -->
    <div class="bg-gray-900 rounded-2xl border border-gray-800 p-6">
      <h3 class="text-white font-semibold text-lg mb-4">Change Password</h3>

      <!-- Step 1: Enter email and send OTP -->
      <div *ngIf="!otpVerified">

        <div class="mb-4">
          <label class="block text-sm text-gray-400 mb-1">Send OTP to Email</label>
          <div class="flex gap-2">
            <input [(ngModel)]="otpEmail" type="email"
              [disabled]="otpSent"
              placeholder="Enter email to send OTP"
              class="flex-1 px-4 py-2.5 bg-gray-800 border border-gray-700 rounded-xl text-white text-sm focus:outline-none focus:border-red-500 disabled:opacity-50"/>
            <button (click)="sendOtp()" [disabled]="sendingOtp || otpSent"
              class="px-4 py-2.5 bg-red-600 text-white rounded-xl font-medium hover:bg-red-700 transition-colors disabled:opacity-50 whitespace-nowrap">
              {{ sendingOtp ? 'Sending...' : otpSent ? 'Sent ✓' : 'Send OTP' }}
            </button>
          </div>
        </div>

        <!-- OTP Input -->
        <div *ngIf="otpSent" class="mb-4">
          <label class="block text-sm text-gray-400 mb-1">
            Enter OTP
            <span class="text-red-400 ml-2">Expires in {{ timerDisplay }}</span>
          </label>
          <div class="flex gap-2">
            <input [(ngModel)]="otpValue" type="text" maxlength="6"
              placeholder="Enter 6-digit OTP"
              class="flex-1 px-4 py-2.5 bg-gray-800 border border-gray-700 rounded-xl text-white text-sm focus:outline-none focus:border-red-500"/>
            <button (click)="verifyOtp()" [disabled]="verifyingOtp || !otpValue"
              class="px-4 py-2.5 bg-green-600 text-white rounded-xl font-medium hover:bg-green-700 transition-colors disabled:opacity-50">
              {{ verifyingOtp ? 'Verifying...' : 'Verify' }}
            </button>
          </div>
          <button (click)="otpSent = false; otpValue = ''"
            class="text-gray-500 text-xs mt-2 hover:text-gray-300">
            Resend OTP
          </button>
        </div>

        <!-- OTP Error -->
        <div *ngIf="otpError" class="mb-4 p-3 rounded-lg bg-red-500/10 border border-red-500/30 text-red-400 text-sm">
          {{ otpError }}
        </div>

      </div>

      <!-- Step 2: OTP Verified - Set new password -->
      <div *ngIf="otpVerified">

        <div class="mb-3 p-3 rounded-lg bg-green-500/10 border border-green-500/30 text-green-400 text-sm flex items-center gap-2">
          <mat-icon class="text-sm">check_circle</mat-icon>
          OTP Verified! Set a new password below.
        </div>

        <!-- New Password -->
        <div class="mb-4">
          <label class="block text-sm text-gray-400 mb-1">New Password</label>
          <div class="relative">
            <input [(ngModel)]="newPassword" [type]="showNewPw ? 'text' : 'password'"
              placeholder="Enter new password"
              class="w-full px-4 py-2.5 bg-gray-800 border border-gray-700 rounded-xl text-white text-sm focus:outline-none focus:border-red-500 pr-10"/>
            <button (click)="showNewPw = !showNewPw" type="button"
              class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-white">
              <mat-icon class="text-sm">{{ showNewPw ? 'visibility_off' : 'visibility' }}</mat-icon>
            </button>
          </div>
        </div>

        <!-- Confirm Password -->
        <div class="mb-6">
          <label class="block text-sm text-gray-400 mb-1">Confirm Password</label>
          <div class="relative">
            <input [(ngModel)]="confirmPassword" [type]="showConfirmPw ? 'text' : 'password'"
              placeholder="Confirm new password"
              class="w-full px-4 py-2.5 bg-gray-800 border border-gray-700 rounded-xl text-white text-sm focus:outline-none focus:border-red-500 pr-10"/>
            <button (click)="showConfirmPw = !showConfirmPw" type="button"
              class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-white">
              <mat-icon class="text-sm">{{ showConfirmPw ? 'visibility_off' : 'visibility' }}</mat-icon>
            </button>
          </div>
        </div>

        <!-- PW Error / Success -->
        <div *ngIf="pwError" class="mb-4 p-3 rounded-lg bg-red-500/10 border border-red-500/30 text-red-400 text-sm">
          {{ pwError }}
        </div>
        <div *ngIf="pwSuccess" class="mb-4 p-3 rounded-lg bg-green-500/10 border border-green-500/30 text-green-400 text-sm">
          {{ pwSuccess }}
        </div>

        <button (click)="changePassword()" [disabled]="changingPw"
          class="px-6 py-2.5 bg-red-600 text-white rounded-xl font-medium hover:bg-red-700 transition-colors disabled:opacity-50">
          {{ changingPw ? 'Changing...' : 'Change Password' }}
        </button>

      </div>
    </div>

  </div>
</div>
